name: Release

'on':
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-15
    env:
      HAS_SIGNING_CERT: ${{ secrets.APPLE_DEVELOPER_ID_P12 != '' && secrets.APPLE_DEVELOPER_ID_P12_PASSWORD != '' }}
      HAS_NOTARIZATION_CREDS: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION != '' && secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive release version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "APP_VERSION=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_ENV"
          fi

      - name: Import Developer ID certificate
        if: ${{ env.HAS_SIGNING_CERT == 'true' }}
        env:
          APPLE_DEVELOPER_ID_P12: ${{ secrets.APPLE_DEVELOPER_ID_P12 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          CERT_PATH: ${{ runner.temp }}/developer-id.p12
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/smartcontrol-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path
          Path(os.environ["CERT_PATH"]).write_bytes(base64.b64decode(os.environ["APPLE_DEVELOPER_ID_P12"]))
          PY

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_DEVELOPER_ID_P12_PASSWORD" \
            -A \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        shell: bash

      - name: Package release artifacts
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [[ "$HAS_NOTARIZATION_CREDS" == "true" ]]; then
            export NOTARIZE=1
          fi

          ./script/build_and_run.sh --package

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smartcontrol-release-${{ env.APP_VERSION }}
          path: dist/release/**/*

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release/${{ env.APP_VERSION }}/RELEASE_NOTES_TEMPLATE.md
          files: |
            dist/release/${{ env.APP_VERSION }}/SmartControl-${{ env.APP_VERSION }}.zip
            dist/release/${{ env.APP_VERSION }}/SmartControl-${{ env.APP_VERSION }}.zip.sha256
            dist/release/${{ env.APP_VERSION }}/SmartControl-${{ env.APP_VERSION }}.dmg
            dist/release/${{ env.APP_VERSION }}/SmartControl-${{ env.APP_VERSION }}.dmg.sha256
            dist/release/${{ env.APP_VERSION }}/release-manifest.json
